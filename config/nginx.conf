# /etc/nginx/sites-available/api.dealapprover.com
# Symlink to /etc/nginx/sites-enabled/ and reload nginx.
# TLS is handled by Certbot — run:
#   certbot --nginx -d api.dealapprover.com

server {
    listen 80;
    server_name api.dealapprover.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.dealapprover.com;

    # Certbot fills these in automatically
    # ssl_certificate /etc/letsencrypt/live/api.dealapprover.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.dealapprover.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # Trust pages cache: stale-while-revalidate 60s
    location ~* ^/c/ {
        proxy_pass         http://127.0.0.1:3005;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_valid  200 60s;
        add_header         Cache-Control "public, max-age=0, stale-while-revalidate=60";
    }

    # API + well-known — no caching
    location / {
        proxy_pass         http://127.0.0.1:3005;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Block direct access to admin from non-loopback if desired
    location /admin {
        allow 127.0.0.1;
        deny  all;
        proxy_pass http://127.0.0.1:3005;
    }

    # Gzip
    gzip on;
    gzip_types text/html application/json text/css application/javascript image/svg+xml;
    gzip_min_length 1024;
}
